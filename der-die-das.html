<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Der, Die oder Das?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .app { max-width: 480px; width: 100%; padding: 32px 20px; text-align: center; }
  h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
  input { flex: 1; padding: 14px 18px; border-radius: 14px; font-size: 18px; background: #1e293b; color: #f1f5f9; border: 1.5px solid #475569; outline: none; font-family: inherit; }
  input:focus { border-color: #38bdf8; }
  input::placeholder { color: #64748b; }
  button { padding: 14px 24px; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; border: none; background: #38bdf8; color: #0f172a; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.5; cursor: wait; }
  .result { padding: 24px; border-radius: 16px; margin-bottom: 20px; transition: all 0.3s; }
  .article { font-size: 20px; font-weight: 600; }
  .noun { font-size: 42px; font-weight: 800; margin: 8px 0; }
  .gender-label { font-size: 13px; margin-top: 4px; }
  .m { background: #38bdf822; border: 2px solid #38bdf855; }
  .m .article, .m .gender-label { color: #38bdf8; }
  .m .noun { color: #7dd3fc; }
  .f { background: #f472b622; border: 2px solid #f472b655; }
  .f .article, .f .gender-label { color: #f472b6; }
  .f .noun { color: #f9a8d4; }
  .n { background: #fb923c22; border: 2px solid #fb923c55; }
  .n .article, .n .gender-label { color: #fb923c; }
  .n .noun { color: #fdba74; }
  .err { background: #f8717115; border: 1.5px solid #f8717144; color: #f87171; font-size: 14px; padding: 14px; border-radius: 14px; margin-bottom: 20px; }
  .loading { color: #38bdf8; font-size: 14px; padding: 14px; }
  .history { text-align: left; }
  .history h3 { font-size: 13px; color: #475569; margin-bottom: 8px; font-weight: 600; }
  .history-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-item { padding: 5px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .history-item:hover { opacity: 0.8; }
  .history-item.m { color: #38bdf8; }
  .history-item.f { color: #f472b6; }
  .history-item.n { color: #fb923c; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .result { animation: fadeIn 0.3s ease; }
  .footer { margin-top: 32px; font-size: 11px; color: #334155; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
(function(){
var e = React.createElement;
var cache = {};
var ARTICLES = { m: "der", f: "die", n: "das" };
var LABELS = { m: "maskulin", f: "feminin", n: "neutrum" };

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase(); }

function extractGenderEN(txt) {
  var i = txt.indexOf("==German==");
  if (i === -1) return null;
  var s = txt.substring(i, i + 5000);
  var patterns = [
    /\{\{de-noun\|([mfn])/, /\{\{de-noun\|<([mfn])>/, /\|g=([mfn])/,
    /\{\{head\|de\|noun\|g=([mfn])/, /\{\{g\|([mfn])\}\}/
  ];
  for (var j = 0; j < patterns.length; j++) {
    var m = s.match(patterns[j]);
    if (m) return m[1];
  }
  return null;
}

function extractGenderDE(txt) {
  var patterns = [
    /Wortart\|Substantiv\|Deutsch\}\}[^}]*\{\{([mfn])\}\}/,
    /\{\{Deutsch Substantiv[\s\S]{0,300}\|Genus=([mfn])/,
    /\|Genus=([mfn])/,
  ];
  for (var j = 0; j < patterns.length; j++) {
    var m = txt.match(patterns[j]);
    if (m) return m[1];
  }
  return null;
}

function getWikitext(domain, word) {
  var url = "https://" + domain + "/w/api.php?action=query&titles=" +
    encodeURIComponent(word) + "&prop=revisions&rvprop=content&rvslots=main&format=json&origin=*";
  return fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    if (!data.query || !data.query.pages) return null;
    var pages = data.query.pages;
    var keys = Object.keys(pages);
    for (var i = 0; i < keys.length; i++) {
      var pg = pages[keys[i]];
      if (pg.missing !== undefined) continue;
      if (pg.revisions && pg.revisions[0]) {
        var rev = pg.revisions[0];
        if (rev.slots && rev.slots.main) return rev.slots.main["*"] || rev.slots.main.content || null;
        if (rev["*"]) return rev["*"];
      }
    }
    return null;
  }).catch(function() { return null; });
}

function lookupGender(noun) {
  var lw = noun.toLowerCase();
  if (cache[lw]) return Promise.resolve(cache[lw]);
  var word = cap(noun);

  return getWikitext("en.wiktionary.org", word).then(function(txt) {
    if (txt) { var g = extractGenderEN(txt); if (g) { cache[lw] = g; return g; } }
    return getWikitext("de.wiktionary.org", word);
  }).then(function(r) {
    if (typeof r === "string" && r.length === 1) return r;
    if (typeof r === "string") { var g = extractGenderDE(r); if (g) { cache[lw] = g; return g; } }
    // Last try: action=parse on en.wiktionary
    return fetch("https://en.wiktionary.org/w/api.php?action=parse&page=" +
      encodeURIComponent(word) + "&prop=wikitext&format=json&origin=*")
      .then(function(r2) { return r2.json(); })
      .then(function(d) {
        if (!d.parse || !d.parse.wikitext) return null;
        var g2 = extractGenderEN(d.parse.wikitext["*"] || "");
        if (g2) { cache[lw] = g2; return g2; }
        return null;
      }).catch(function() { return null; });
  }).catch(function() { return null; });
}

function App() {
  var _input = React.useState(""), input = _input[0], setInput = _input[1];
  var _result = React.useState(null), result = _result[0], setResult = _result[1];
  var _loading = React.useState(false), loading = _loading[0], setLoading = _loading[1];
  var _error = React.useState(null), error = _error[0], setError = _error[1];
  var _history = React.useState([]), history = _history[0], setHistory = _history[1];

  function go(word) {
    var w = (word || input).trim();
    if (!w) return;
    setLoading(true); setError(null); setResult(null);
    lookupGender(w).then(function(g) {
      setLoading(false);
      if (!g) { setError('Could not find "' + cap(w) + '". Check spelling and use the base form (e.g. Haus not Häuser).'); return; }
      var r = { gender: g, noun: cap(w), article: ARTICLES[g] };
      setResult(r);
      setHistory(function(prev) {
        var filtered = prev.filter(function(h) { return h.noun !== r.noun; });
        return [r].concat(filtered).slice(0, 20);
      });
    });
  }

  function handleKey(ev) { if (ev.key === "Enter") go(); }
  function clickHistory(item) { setInput(item.noun); go(item.noun); }

  return e("div", null,
    e("h1", null, "Der, Die oder Das?"),
    e("p", { className: "sub" }, "Type any German noun \u2192 get the correct article"),
    e("div", { className: "input-row" },
      e("input", { type: "text", value: input, onChange: function(ev) { setInput(ev.target.value); },
        onKeyDown: handleKey, placeholder: "z.B. Auto, Frau, Hund\u2026", autoFocus: true }),
      e("button", { onClick: function() { go(); }, disabled: loading }, loading ? "\u2026" : "Go")
    ),
    loading ? e("div", { className: "loading" }, "\uD83D\uDD0D Looking up\u2026") : null,
    result ? e("div", { className: "result " + result.gender, key: result.noun },
      e("div", { className: "article" }, result.article),
      e("div", { className: "noun" }, result.noun),
      e("div", { className: "gender-label" }, LABELS[result.gender])
    ) : null,
    error ? e("div", { className: "err" }, "\u26A0\uFE0F " + error) : null,
    history.length > 0 ? e("div", { className: "history" },
      e("h3", null, "Recent lookups"),
      e("div", { className: "history-list" },
        history.map(function(h) {
          return e("span", { key: h.noun, className: "history-item " + h.gender,
            onClick: function() { clickHistory(h); },
            style: { background: h.gender === "m" ? "#38bdf815" : h.gender === "f" ? "#f472b615" : "#fb923c15",
              border: "1px solid " + (h.gender === "m" ? "#38bdf833" : h.gender === "f" ? "#f472b633" : "#fb923c33") }
          }, h.article + " " + h.noun);
        })
      )
    ) : null,
    e("div", { className: "footer" }, "Gender data from Wiktionary")
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(e(App));
})();
</script>
</body>
</html>
