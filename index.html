var END={definite:{Nominativ:{m:"-e",f:"-e",n:"-e",pl:"-en"},Akkusativ:{m:"-en",f:"-e",n:"-e",pl:"-en"},Dativ:{m:"-en",f:"-en",n:"-en",pl:"-en"},Genitiv:{m:"-en",f:"-en",n:"-en",pl:"-en"}},indefinite:{Nominativ:{m:"-er",f:"-e",n:"-es",pl:"-en"},Akkusativ:{m:"-en",f:"-e",n:"-es",pl:"-en"},Dativ:{m:"-en",f:"-en",n:"-en",pl:"-en"},Genitiv:{m:"-en",f:"-en",n:"-en",pl:"-en"}},none:{Nominativ:{m:"-er",f:"-e",n:"-es",pl:"-e"},Akkusativ:{m:"-en",f:"-e",n:"-es",pl:"-e"},Dativ:{m:"-em",f:"-er",n:"-em",pl:"-en"},Genitiv:{m:"-en",f:"-er",n:"-en",pl:"-er"}}};

var ARTICLE_BASES={der:{type:"definite",base:"def"},die:{type:"definite",base:"def"},das:{type:"definite",base:"def"},den:{type:"definite",base:"def"},dem:{type:"definite",base:"def"},des:{type:"definite",base:"def"},dieser:{type:"definite",base:"dies"},diese:{type:"definite",base:"dies"},dieses:{type:"definite",base:"dies"},diesem:{type:"definite",base:"dies"},diesen:{type:"definite",base:"dies"},jeder:{type:"definite",base:"jed"},jede:{type:"definite",base:"jed"},jedes:{type:"definite",base:"jed"},jedem:{type:"definite",base:"jed"},jeden:{type:"definite",base:"jed"},welcher:{type:"definite",base:"welch"},welche:{type:"definite",base:"welch"},welches:{type:"definite",base:"welch"},welchem:{type:"definite",base:"welch"},welchen:{type:"definite",base:"welch"},ein:{type:"indefinite",base:"ein"},eine:{type:"indefinite",base:"ein"},einen:{type:"indefinite",base:"ein"},einem:{type:"indefinite",base:"ein"},einer:{type:"indefinite",base:"ein"},eines:{type:"indefinite",base:"ein"},kein:{type:"indefinite",base:"kein"},keine:{type:"indefinite",base:"kein"},keinen:{type:"indefinite",base:"kein"},keinem:{type:"indefinite",base:"kein"},keiner:{type:"indefinite",base:"kein"},keines:{type:"indefinite",base:"kein"},mein:{type:"indefinite",base:"mein"},meine:{type:"indefinite",base:"mein"},meinen:{type:"indefinite",base:"mein"},meinem:{type:"indefinite",base:"mein"},meiner:{type:"indefinite",base:"mein"},meines:{type:"indefinite",base:"mein"},dein:{type:"indefinite",base:"dein"},deine:{type:"indefinite",base:"dein"},deinen:{type:"indefinite",base:"dein"},deinem:{type:"indefinite",base:"dein"},deiner:{type:"indefinite",base:"dein"},deines:{type:"indefinite",base:"dein"},sein:{type:"indefinite",base:"sein"},seine:{type:"indefinite",base:"sein"},seinen:{type:"indefinite",base:"sein"},seinem:{type:"indefinite",base:"sein"},seiner:{type:"indefinite",base:"sein"},seines:{type:"indefinite",base:"sein"},ihr:{type:"indefinite",base:"ihr"},ihre:{type:"indefinite",base:"ihr"},ihren:{type:"indefinite",base:"ihr"},ihrem:{type:"indefinite",base:"ihr"},ihrer:{type:"indefinite",base:"ihr"},ihres:{type:"indefinite",base:"ihr"},unser:{type:"indefinite",base:"unser"},unsere:{type:"indefinite",base:"unser"},unseren:{type:"indefinite",base:"unser"},unserem:{type:"indefinite",base:"unser"},unserer:{type:"indefinite",base:"unser"},unseres:{type:"indefinite",base:"unser"},euer:{type:"indefinite",base:"euer"},eure:{type:"indefinite",base:"eur"},euren:{type:"indefinite",base:"eur"},eurem:{type:"indefinite",base:"eur"},eurer:{type:"indefinite",base:"eur"},eures:{type:"indefinite",base:"eur"}};

var DEF_FORMS={Nominativ:{m:"der",f:"die",n:"das",pl:"die"},Akkusativ:{m:"den",f:"die",n:"das",pl:"die"},Dativ:{m:"dem",f:"der",n:"dem",pl:"den"},Genitiv:{m:"des",f:"der",n:"des",pl:"der"}};

function diesLikeForm(stem,cas,g){var s={Nominativ:{m:"er",f:"e",n:"es",pl:"e"},Akkusativ:{m:"en",f:"e",n:"es",pl:"e"},Dativ:{m:"em",f:"er",n:"em",pl:"en"},Genitiv:{m:"es",f:"er",n:"es",pl:"er"}};return stem+s[cas][g];}
function einLikeForm(stem,cas,g){var s={Nominativ:{m:"",f:"e",n:"",pl:"e"},Akkusativ:{m:"en",f:"e",n:"",pl:"e"},Dativ:{m:"em",f:"er",n:"em",pl:"en"},Genitiv:{m:"es",f:"er",n:"es",pl:"er"}};return stem+s[cas][g];}
function correctArticle(aw,cas,g){var info=ARTICLE_BASES[aw.toLowerCase()];if(!info)return aw;var b=info.base;if(b==="def")return DEF_FORMS[cas][g];if(b==="dies")return diesLikeForm("dies",cas,g);if(b==="jed")return diesLikeForm("jed",cas,g);if(b==="welch")return diesLikeForm("welch",cas,g);return einLikeForm(b,cas,g);}
function detectCase(w){w=w.toLowerCase();if(w==="der"||w==="die"||w==="das")return"Nominativ";if(w==="den")return"Akkusativ";if(w==="dem")return"Dativ";if(w==="des")return"Genitiv";if(w.endsWith("em"))return"Dativ";if(w==="dieses"||w==="jedes"||w==="welches")return"Nominativ";if(w.endsWith("es"))return"Genitiv";if(w.endsWith("en"))return"Akkusativ";if(w==="einer"||w==="keiner"||w==="meiner"||w==="deiner"||w==="seiner"||w==="ihrer"||w==="unserer"||w==="eurer")return"Dativ";if(w==="diesem"||w==="jedem"||w==="welchem")return"Dativ";if(w==="diesen"||w==="jeden"||w==="welchen")return"Akkusativ";if(w==="dieser"||w==="jeder"||w==="welcher")return"Nominativ";return"Nominativ";}

var genderCache={};

// GENDER LOOKUP: Try 3 different strategies
function lookupGender(noun, setDebug) {
  var lw=noun.toLowerCase();
  if(genderCache[lw])return Promise.resolve(genderCache[lw]);
  var capWord=lw.charAt(0).toUpperCase()+lw.slice(1);

  // Strategy 1: en.wiktionary action=query (most CORS-friendly)
  function tryEnQuery(){
    var url="https://en.wiktionary.org/w/api.php?action=query&titles="+encodeURIComponent(capWord)+"&prop=revisions&rvprop=content&rvslots=main&format=json&origin=*";
    if(setDebug)setDebug("Trying en.wiktionary query API...");
    return fetch(url).then(function(r){return r.json();}).then(function(data){
      if(!data.query||!data.query.pages)return null;
      var pages=data.query.pages;var keys=Object.keys(pages);
      for(var i=0;i<keys.length;i++){
        var pg=pages[keys[i]];if(pg.missing!==undefined)continue;
        if(pg.revisions&&pg.revisions[0]){
          var rev=pg.revisions[0];
          var txt=null;
          if(rev.slots&&rev.slots.main)txt=rev.slots.main["*"]||rev.slots.main.content;
          else if(rev["*"])txt=rev["*"];
          if(txt){var g=extractGender(txt);if(g)return g;}
        }
      }
      return null;
    }).catch(function(err){if(setDebug)setDebug("en query failed: "+err.message);return null;});
  }

  // Strategy 2: en.wiktionary action=parse
  function tryEnParse(){
    var url="https://en.wiktionary.org/w/api.php?action=parse&page="+encodeURIComponent(capWord)+"&prop=wikitext&format=json&origin=*";
    if(setDebug)setDebug("Trying en.wiktionary parse API...");
    return fetch(url).then(function(r){return r.json();}).then(function(data){
      if(!data.parse||!data.parse.wikitext)return null;
      var txt=data.parse.wikitext["*"]||"";
      return extractGender(txt);
    }).catch(function(err){if(setDebug)setDebug("en parse failed: "+err.message);return null;});
  }

  // Strategy 3: de.wiktionary (German Wiktionary) - different template format
  function tryDeWikt(){
    var url="https://de.wiktionary.org/w/api.php?action=query&titles="+encodeURIComponent(capWord)+"&prop=revisions&rvprop=content&rvslots=main&format=json&origin=*";
    if(setDebug)setDebug("Trying de.wiktionary...");
    return fetch(url).then(function(r){return r.json();}).then(function(data){
      if(!data.query||!data.query.pages)return null;
      var pages=data.query.pages;var keys=Object.keys(pages);
      for(var i=0;i<keys.length;i++){
        var pg=pages[keys[i]];if(pg.missing!==undefined)continue;
        if(pg.revisions&&pg.revisions[0]){
          var rev=pg.revisions[0];
          var txt=null;
          if(rev.slots&&rev.slots.main)txt=rev.slots.main["*"]||rev.slots.main.content;
          else if(rev["*"])txt=rev["*"];
          if(txt){var g=extractGenderDE(txt);if(g)return g;}
        }
      }
      return null;
    }).catch(function(err){if(setDebug)setDebug("de wikt failed: "+err.message);return null;});
  }

  return tryEnQuery().then(function(g){
    if(g){genderCache[lw]=g;return g;}
    return tryEnParse();
  }).then(function(g){
    if(g&&g.length===1){genderCache[lw]=g;return g;}
    return tryDeWikt();
  }).then(function(g){
    if(g&&g.length===1){genderCache[lw]=g;return g;}
    return null;
  });
}

// Extract gender from English Wiktionary wikitext
function extractGender(txt){
  var deIdx=txt.indexOf("==German==");
  if(deIdx===-1)return null;
  var section=txt.substring(deIdx,deIdx+5000);
  var patterns=[
    /\{\{de-noun\|([mfn])/,           // {{de-noun|f}}
    /\{\{de-noun\|<([mfn])>/,          // {{de-noun|<f>}}
    /\|g=([mfn])/,                      // |g=f
    /\{\{head\|de\|noun\|g=([mfn])/,   // {{head|de|noun|g=f}}
    /\{\{g\|([mfn])\}\}/,              // {{g|f}}
    /\bgenitive\b.*?\b(masculine|feminine|neuter)\b/i,
  ];
  for(var i=0;i<patterns.length;i++){
    var m=section.match(patterns[i]);
    if(m){
      if(m[1]==="masculine")return"m";
      if(m[1]==="feminine")return"f";
      if(m[1]==="neuter")return"n";
      return m[1];
    }
  }
  // Try to find "Noun" section with f/m/n marker
  var nounMatch=section.match(/===Noun===[\s\S]{0,500}?\b([mfn])\s/);
  if(nounMatch)return nounMatch[1];
  return null;
}

// Extract gender from German Wiktionary wikitext
function extractGenderDE(txt){
  // {{Deutsch Substantiv Übersicht ... |Genus=f  or  {{Wortart|Substantiv|Deutsch}}, {{f}}
  var patterns=[
    /\{\{([mfn])\}\}/,                       // {{f}} {{m}} {{n}}
    /\|Genus=([mfn])/,                        // |Genus=f
    /Wortart\|Substantiv\|Deutsch\}\},\s*\{\{([mfn])\}\}/, // Substantiv + gender
    /Substantiv[\s\S]{0,200}\{\{([mfn])\}\}/, // Substantiv ... {{f}}
  ];
  for(var i=0;i<patterns.length;i++){
    var m=txt.match(patterns[i]);
    if(m)return m[1];
  }
  return null;
}

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function applyEnd(adj,ending){var stem=adj.toLowerCase().trim();var sfs=["en","em","er","es","e"];for(var i=0;i<sfs.length;i++){if(stem.endsWith(sfs[i])&&stem.length>sfs[i].length+2){stem=stem.slice(0,-sfs[i].length);break;}}return stem+ending.replace("-","");}

function buildResult(input,gender){
  var words=input.trim().toLowerCase().split(/\s+/).filter(Boolean);
  if(words.length<2)return{error:'Enter at least 2 words, e.g. "ein kalt Bier"'};
  var aw=null,adj,noun;var artInfo=ARTICLE_BASES[words[0]];
  if(artInfo){aw=words[0];if(words.length>=3){adj=words[1];noun=words[2];}else{adj=words[1];noun=null;}}
  else{adj=words[0];noun=words.length>=2?words[1]:null;}
  if(!gender)return{error:'Could not determine gender'};
  var cas=aw?detectCase(aw):"Nominativ";
  var articleType=artInfo?artInfo.type:"none";
  var ending=END[articleType][cas][gender];
  var correctedAdj=applyEnd(adj,ending);
  var correctedArt=aw?correctArticle(aw,cas,gender):null;
  var parts=[];if(correctedArt)parts.push(cap(correctedArt));parts.push(correctedAdj);if(noun)parts.push(cap(noun));
  var corrected=parts.join(" ");
  var fixes=[];
  if(aw&&correctedArt&&aw.toLowerCase()!==correctedArt.toLowerCase())fixes.push(aw+" \u2192 "+correctedArt);
  if(adj.toLowerCase()!==correctedAdj.toLowerCase())fixes.push(adj+" \u2192 "+correctedAdj);
  return{articleType:articleType,cas:cas,gender:gender,ending:ending,corrected:corrected,articleWord:correctedArt,fixes:fixes};
}

    {id:"i-eines-n",label:"eines",sublabel:"neut. Gen",color:gc.n,leaf:true,ending:"-en",example:"eines neuen Buches",cas:"Genitiv",gender:"n"},
    {id:"i-eine",label:"eine",sublabel:"fem. Nom/Akk",color:gc.f,leaf:true,ending:"-e",example:"eine kleine Frau",cas:"Nominativ",gender:"f"},
    {id:"i-einer",label:"einer",sublabel:"fem. Dat/Gen",color:gc.f,leaf:true,ending:"-en",example:"einer kleinen Frau",cas:"Dativ",gender:"f"},
    {id:"i-ein-n",label:"ein",sublabel:"neut. Nom/Akk",color:gc.n,leaf:true,ending:"-es \u26A1",example:"ein neues Buch",cas:"Nominativ",gender:"n",note:'"ein" has no ending \u2192 adjective shows gender!'}

    var gl={m:"masc",f:"fem",n:"neut",pl:"plural"};
    var ex={Nominativ:{m:"kalter Kaffee",f:"frische Milch",n:"kaltes Wasser",pl:"gute Leute"},Akkusativ:{m:"kalten Kaffee",f:"frische Milch",n:"kaltes Wasser",pl:"gute Leute"},Dativ:{m:"kaltem Kaffee",f:"frischer Milch",n:"kaltem Wasser",pl:"guten Leuten"},Genitiv:{m:"kalten Kaffees",f:"frischer Milch",n:"kalten Wassers",pl:"guter Leute"}};
    return cases.map(function(cs){return{id:"n-"+cs.toLowerCase().slice(0,3),label:cs,color:C.a3,children:gs.map(function(g){return{id:"n-"+cs.toLowerCase().slice(0,3)+"-"+g,label:gl[g]+": "+END.none[cs][g],color:gc[g],leaf:true,ending:END.none[cs][g],example:ex[cs][g],cas:cs,gender:g};})};});

function findHL(p){if(!p||p.error)return{};var ids={root:1};ids[p.articleType]=1;var branch=TREE.children.find(function(c){return c.id===p.articleType;});if(branch){(function s(ch){for(var i=0;i<ch.length;i++){var c=ch[i];if(c.leaf&&c.cas===p.cas&&c.gender===p.gender){ids[c.id]=1;return true;}if(c.children&&s(c.children)){ids[c.id]=1;return true;}}return false;})(branch.children);}return ids;}

function TreeNode(props){
  var node=props.node,depth=props.depth,exp=props.exp,toggle=props.toggle,hl=props.hl;
  var isExp=!!exp[node.id],isHL=!!hl[node.id],hasKids=node.children&&node.children.length>0;
  var color=node.color||C.tm;
  return e("div",{style:{marginTop:depth===0?6:4}},
    e("div",{onClick:hasKids?function(){toggle(node.id);}:undefined,style:{display:"flex",alignItems:"center",gap:10,padding:node.leaf?"8px 12px":"10px 14px",borderRadius:12,cursor:hasKids?"pointer":"default",background:isHL?color+"20":C.card,border:"1.5px solid "+(isHL?color:C.bd),transition:"all 0.25s ease",boxShadow:isHL?"0 0 14px "+color+"33":"none"}},
      hasKids?e("span",{style:{color:color,fontSize:12,fontWeight:700,minWidth:14,textAlign:"center",transition:"transform 0.2s",transform:isExp?"rotate(90deg)":"rotate(0)"}},"\u25B6"):null,
      node.leaf&&node.ending?e("span",{style:{fontFamily:"monospace",fontWeight:800,fontSize:15,color:color,background:color+"22",padding:"2px 10px",borderRadius:6,border:"1px solid "+color+"44"}},node.ending):null,
      e("div",{style:{flex:1,minWidth:0}},
        e("span",{style:{fontWeight:700,color:isHL?color:C.tx,fontSize:depth<1?15:14}},node.label),
        node.sublabel?e("span",{style:{marginLeft:8,fontSize:12,color:C.tm}},node.sublabel):null,
        node.note&&isHL?e("div",{style:{fontSize:11,color:C.yl,marginTop:4}},"\uD83D\uDCA1 "+node.note):null),
      node.example?e("span",{style:{fontSize:12,fontStyle:"italic",color:isHL?C.tx:C.tm,background:isHL?color+"18":"transparent",padding:"2px 8px",borderRadius:6,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:200}},node.example):null
    ),
    isExp&&hasKids?e("div",{style:{marginLeft:18,borderLeft:"2px solid "+(isHL?color+"66":C.bd),paddingLeft:10,marginTop:2}},node.children.map(function(ch){return e(TreeNode,{key:ch.id,node:ch,depth:depth+1,exp:exp,toggle:toggle,hl:hl});})):null
  );
}

function App(){
  var _exp=React.useState({root:1}),exp=_exp[0],setExp=_exp[1];
  var _hl=React.useState({}),hl=_hl[0],setHL=_hl[1];
  var _input=React.useState(""),input=_input[0],setInput=_input[1];
  var _result=React.useState(null),result=_result[0],setResult=_result[1];
  var _loading=React.useState(false),loading=_loading[0],setLoading=_loading[1];
  var _debug=React.useState(""),debug=_debug[0],setDebug=_debug[1];

  var gL={m:"Maskulin",f:"Feminin",n:"Neutrum",pl:"Plural"};
  var tC={definite:C.a1,indefinite:C.a2,none:C.a3};

  function toggle(id){setExp(function(prev){var n=Object.assign({},prev);if(n[id])delete n[id];else n[id]=1;return n;});}

  function go(){
    if(!input.trim())return;
    var words=input.trim().toLowerCase().split(/\s+/).filter(Boolean);
    var noun=null;var artInfo=ARTICLE_BASES[words[0]];
    if(artInfo&&words.length>=3)noun=words[2];
    else if(artInfo&&words.length===2)noun=null;
    else if(words.length>=2)noun=words[1];
    if(!noun){setResult({error:'Add a noun, e.g. "ein jung Frau"'});return;}

    var cached=genderCache[noun.toLowerCase()];
    if(cached){var p=buildResult(input,cached);setResult(p);var ids=findHL(p);setHL(ids);setExp(function(prev){return Object.assign({},prev,ids);});return;}

    setLoading(true);setResult(null);setDebug("");
    lookupGender(noun,setDebug).then(function(gender){
      setLoading(false);
      if(!gender){
